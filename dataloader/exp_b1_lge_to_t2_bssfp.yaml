# configs/2d/exp_b1_lge_to_t2_bssfp.yaml
#
# (b) Different Sequence Intra-Center — EXP 1
# Train: LGE (B, C)   Test: T2 (B, C), bSSFP (B, C)
#
# IMPORTANT: B and C have the SAME patients across all 3 sequences.
# To avoid leakage (training on LGE of patient X, testing on T2 of the
# SAME patient X), we split case_ids per center into disjoint train/test
# pools FIRST, then assign sequences. patient_split below is the only
# difference vs a same-sequence experiment — the Dataset class checks
# for this key and filters case_id accordingly.

name: exp_b1_lge_to_t2_bssfp

train:
  - {center: B, sequence: LGE}
  - {center: C, sequence: LGE}

test:
  - {center: B, sequence: T2}
  - {center: B, sequence: bSSFP}
  - {center: C, sequence: T2}
  - {center: C, sequence: bSSFP}

# Patient-level split: case_ids assigned to train_pool are the ONLY ones
# allowed in the train split above; case_ids in test_pool are the ONLY
# ones allowed in the test split above. Generate these once with
# scripts/make_patient_split.py (80/20 stratified by center) and paste
# the resulting lists here so the split is fixed and reproducible across
# every run of this experiment.
patient_split:
  B:
    train_pool: ['Case2001', 'Case2002', 'Case2003', 'Case2004', 'Case2005', 'Case2007', 'Case2008', 'Case2009', 'Case2011', 'Case2012', 'Case2014', 'Case2015', 'Case2016', 'Case2017', 'Case2018', 'Case2019', 'Case2020', 'Case2022', 'Case2024', 'Case2025', 'Case2026', 'Case2027', 'Case2028', 'Case2029', 'Case2031', 'Case2033', 'Case2034', 'Case2035']
    test_pool: ['Case2006', 'Case2010', 'Case2013', 'Case2021', 'Case2023', 'Case2030', 'Case2032']
  C:
    train_pool: ['Case3002', 'Case3003', 'Case3004', 'Case3005', 'Case3006', 'Case3007', 'Case3008', 'Case3010', 'Case3012', 'Case3013', 'Case3014', 'Case3017', 'Case3018', 'Case3019', 'Case3020', 'Case3021', 'Case3022', 'Case3023', 'Case3024', 'Case3025', 'Case3026', 'Case3027', 'Case3028', 'Case3030', 'Case3031', 'Case3032', 'Case3033', 'Case3036', 'Case3037', 'Case3038', 'Case3040', 'Case3041', 'Case3042', 'Case3043', 'Case3044', 'Case3045']
    test_pool: ['Case3001', 'Case3009', 'Case3011', 'Case3015', 'Case3016', 'Case3029', 'Case3034', 'Case3035', 'Case3039']

classes: [background, LV, Myo, Scar]
max_slices_per_case: null
